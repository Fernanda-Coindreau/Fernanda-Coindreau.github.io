<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Triage Agent</title>
    <style>
        :root {
            --navy: #2e2640;
            --gold: #d4a8c7;
            --navy-mid: #3a3050;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--navy);
            color: #fff;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: var(--gold);
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #b8a8c8;
            font-size: 0.95rem;
        }

        .api-key-section {
            background: var(--navy-mid);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .api-key-section label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 500;
        }

        .api-key-section input {
            width: 100%;
            padding: 12px;
            background: var(--navy);
            border: 1px solid var(--gold);
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
        }

        .api-key-section input::placeholder {
            color: #888;
        }

        .ticket-section {
            background: var(--navy-mid);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .ticket-section label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 500;
        }

        .ticket-section select,
        .ticket-section textarea {
            width: 100%;
            padding: 12px;
            background: var(--navy);
            border: 1px solid var(--gold);
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .ticket-section select {
            margin-bottom: 15px;
            cursor: pointer;
        }

        .ticket-section textarea {
            min-height: 120px;
            resize: vertical;
        }

        .ticket-section textarea::placeholder {
            color: #888;
        }

        .analyze-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .analyze-btn:hover:not(:disabled) {
            background: #e0b8d7;
            transform: translateY(-2px);
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reasoning-steps {
            margin-top: 30px;
        }

        .step {
            background: var(--navy-mid);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid transparent;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .step.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .step.thinking {
            border-left-color: #888;
        }

        .step.done {
            border-left-color: var(--gold);
        }

        .step-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .step-number {
            background: var(--gold);
            color: var(--navy);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 12px;
            font-size: 0.9rem;
        }

        .step-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold);
            flex: 1;
        }

        .step-status {
            font-size: 0.85rem;
            color: #888;
            font-style: italic;
        }

        .step-status.done {
            color: var(--gold);
        }

        .step-content {
            color: #e0e0e0;
            padding-left: 44px;
            line-height: 1.7;
        }

        .step-content.typing::after {
            content: '▊';
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .output-card {
            background: var(--navy-mid);
            padding: 25px;
            border-radius: 8px;
            margin-top: 30px;
            border: 2px solid var(--gold);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .output-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .output-card h3 {
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .output-card .output-content {
            background: var(--navy);
            padding: 20px;
            border-radius: 6px;
            color: #e0e0e0;
            white-space: pre-wrap;
            line-height: 1.7;
            border-left: 4px solid var(--gold);
        }

        .error-message {
            background: #5a2e3e;
            color: #ffb3b3;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border-left: 4px solid #ff6b6b;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .api-key-section,
            .ticket-section,
            .step,
            .output-card {
                padding: 15px;
            }

            .step-content {
                padding-left: 0;
                margin-top: 10px;
            }
        }

        .urgency-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .urgency-low {
            background: #4a5568;
            color: #e0e0e0;
        }

        .urgency-medium {
            background: #d69e2e;
            color: #1a202c;
        }

        .urgency-high {
            background: #e07a5f;
            color: #1a202c;
        }

        .urgency-critical {
            background: #c53030;
            color: #fff;
        }
    </style>
</head>
<body>
    <a href="https://fernanda-coindreau.github.io/" target="_self" style="
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 9999;
  background: rgba(0,0,0,0.75);
  color: #ffffff;
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-family: sans-serif;
  font-weight: 500;
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.15);
  transition: background 0.2s;
">← Portfolio</a>
    <div class="container">
        <h1>CS Triage Agent</h1>
        <p class="subtitle">AI-powered support ticket analysis and routing</p>

        <div class="api-key-section">
            <label for="apiKey">Anthropic API Key</label>
            <input type="password" id="apiKey" placeholder="sk-ant-...">
        </div>

        <div class="ticket-section">
            <label for="ticketSelect">Select a preloaded ticket or paste your own below:</label>
            <select id="ticketSelect">
                <option value="">-- Select a ticket example --</option>
                <option value="fintech1">Fintech SaaS: CFO can't access transaction history</option>
                <option value="fintech2">Fintech SaaS: Duplicate payment deduction</option>
                <option value="hrtech1">HR Tech SaaS: Schedule sync issue</option>
                <option value="hrtech2">HR Tech SaaS: Onboarding stuck at tax forms</option>
                <option value="healthtech">Health Tech SaaS: Patient records not syncing</option>
                <option value="b2b1">B2B SaaS: Incorrect billing charge</option>
                <option value="b2b2">B2B SaaS: API key stopped working</option>
            </select>

            <label for="ticketText">Support Ticket:</label>
            <textarea id="ticketText" placeholder="Paste or type a support ticket here..."></textarea>

            <button class="analyze-btn" id="analyzeBtn">Analyze Ticket</button>
        </div>

        <div id="reasoningSteps" class="reasoning-steps"></div>
        <div id="outputCard" class="output-card" style="display: none;">
            <h3>Final Output</h3>
            <div class="output-content" id="outputContent"></div>
        </div>
    </div>

    <script>
        const ticketExamples = {
            fintech1: "Our CFO can't access the transaction history for last quarter. We have an audit next week and this is urgent.",
            fintech2: "A payment of $4,200 was deducted twice from our account on May 15th. We need this resolved immediately.",
            hrtech1: "The schedule for next week hasn't synced to the mobile app. Three employees showed up at the wrong time yesterday.",
            hrtech2: "New hire onboarding is stuck at step 3 — the system won't let her complete the tax forms.",
            healthtech: "Patient records from our clinic integration aren't showing up in the dashboard. Last sync was 6 days ago.",
            b2b1: "We were charged $2,400 this month but our plan is $800. No one on our team made any changes.",
            b2b2: "Our API key stopped working at 2am. We have automated reports that run nightly and they all failed."
        };

        const ticketSelect = document.getElementById('ticketSelect');
        const ticketText = document.getElementById('ticketText');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const reasoningSteps = document.getElementById('reasoningSteps');
        const outputCard = document.getElementById('outputCard');
        const outputContent = document.getElementById('outputContent');

        ticketSelect.addEventListener('change', (e) => {
            if (e.target.value) {
                ticketText.value = ticketExamples[e.target.value];
            }
        });

        analyzeBtn.addEventListener('click', analyzeTicket);

        async function analyzeTicket() {
            const apiKey = apiKeyInput.value.trim();
            const ticket = ticketText.value.trim();

            if (!apiKey) {
                alert('Please enter your Anthropic API key');
                return;
            }

            if (!ticket) {
                alert('Please enter or select a support ticket');
                return;
            }

            // Reset UI
            reasoningSteps.innerHTML = '';
            outputCard.style.display = 'none';
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyzing...';

            try {
                // Step 1: Analyze
                await createStep(1, 'Analyze', 'Identifying what the client says vs what they need...');
                
                const analysisResult = await callAnthropicAPI(apiKey, 
                    `You are a senior Customer Success Manager. Analyze this support ticket and respond ONLY in JSON with no extra text: { "analysis": "what the client says vs what they actually need in 2 sentences", "decision": "one of: Reply Directly / Escalate to Senior / Request More Info / Log as Bug", "justification": "why you chose this action in 1 sentence", "urgency": "Low / Medium / High / Critical" }\n\nTicket: ${ticket}`
                );

                let analysisData;
                try {
                    analysisData = JSON.parse(analysisResult);
                } catch (e) {
                    // Try to extract JSON from the response
                    const jsonMatch = analysisResult.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        analysisData = JSON.parse(jsonMatch[0]);
                    } else {
                        throw new Error('Invalid JSON response from API');
                    }
                }

                await typeText(1, analysisData.analysis);
                markStepDone(1);

                // Step 2: Decide
                await createStep(2, 'Decide', 'Determining the best action...');
                const decisionText = `Decision: ${analysisData.decision}\nJustification: ${analysisData.justification}`;
                await typeText(2, decisionText, analysisData.urgency);
                markStepDone(2);

                // Step 3: Execute
                await createStep(3, 'Execute', 'Drafting the output...');
                
                const executePrompt = `Based on this analysis, draft the appropriate output.

Analysis: ${analysisData.analysis}
Decision: ${analysisData.decision}
Urgency: ${analysisData.urgency}
Original Ticket: ${ticket}

${getExecuteInstructions(analysisData.decision)}`;

                const executionResult = await callAnthropicAPI(apiKey, executePrompt);
                await typeText(3, `Drafting ${analysisData.decision.toLowerCase()}...`);
                markStepDone(3);

                // Show final output
                showOutput(executionResult);

            } catch (error) {
                console.error('Error:', error);
                reasoningSteps.innerHTML += `<div class="error-message">Error: ${error.message}</div>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Analyze Ticket';
            }
        }

        function getExecuteInstructions(decision) {
            switch (decision) {
                case 'Reply Directly':
                    return 'Write a professional, empathetic response to the customer that solves their issue. Be specific and actionable.';
                case 'Escalate to Senior':
                    return 'Write an internal escalation email to a senior engineer/manager. Include context, urgency, and what you need from them.';
                case 'Request More Info':
                    return 'Write a professional response asking the customer for specific information needed to resolve their issue. Be clear about what you need and why.';
                case 'Log as Bug':
                    return 'Write a bug report for the engineering team. Include: title, description, steps to reproduce, impact, and priority.';
                default:
                    return 'Provide an appropriate response based on the situation.';
            }
        }

        async function callAnthropicAPI(apiKey, prompt) {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    messages: [{
                        role: 'user',
                        content: prompt
                    }]
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API request failed');
            }

            const data = await response.json();
            return data.content[0].text;
        }

        async function createStep(number, title, initialStatus) {
            const step = document.createElement('div');
            step.className = 'step thinking';
            step.id = `step${number}`;
            step.innerHTML = `
                <div class="step-header">
                    <div class="step-number">${number}</div>
                    <div class="step-title">${title}</div>
                    <div class="step-status" id="status${number}">thinking...</div>
                </div>
                <div class="step-content typing" id="content${number}"></div>
            `;
            reasoningSteps.appendChild(step);
            
            // Trigger animation
            await sleep(50);
            step.classList.add('visible');
            await sleep(300);
        }

        async function typeText(stepNumber, text, urgency = null) {
            const contentEl = document.getElementById(`content${stepNumber}`);
            contentEl.classList.add('typing');
            
            const words = text.split(' ');
            let currentText = '';
            
            for (let i = 0; i < words.length; i++) {
                currentText += (i > 0 ? ' ' : '') + words[i];
                contentEl.textContent = currentText;
                await sleep(30);
            }

            // Add urgency badge if provided
            if (urgency) {
                const badge = document.createElement('span');
                badge.className = `urgency-badge urgency-${urgency.toLowerCase()}`;
                badge.textContent = urgency;
                contentEl.appendChild(document.createElement('br'));
                contentEl.appendChild(badge);
            }

            contentEl.classList.remove('typing');
        }

        function markStepDone(stepNumber) {
            const step = document.getElementById(`step${stepNumber}`);
            const status = document.getElementById(`status${stepNumber}`);
            step.classList.remove('thinking');
            step.classList.add('done');
            status.textContent = 'done';
            status.classList.add('done');
        }

        async function showOutput(content) {
            outputContent.textContent = content;
            outputCard.style.display = 'block';
            await sleep(100);
            outputCard.classList.add('visible');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
